joy_node:
  ros__parameters:
    device_id: 0
    deadzone: 0.05
    autorepeat_rate: 20.0

teleop_node:
  ros__parameters:
    axis_linear:
      x: 1        # left stick vertical (axis index, must be integer)
    scale_linear:
      x: 0.08
    scale_linear_turbo:
      x: 0.08

    axis_angular:
      yaw: 0      # left stick horizontal (axis index, must be integer)
    scale_angular:
      yaw: -0.19
    scale_angular_turbo:
      yaw: -0.19



    enable_button: 6
    enable_turbo_button: 7

    require_enable_button: true